<script>
/*!
 * Fall Kit · v1.0.0 · the shared cascade for every estate seed
 * MIT · Simon Gant · ai-nativesolutions.com · ◊·κ=1
 *
 * Inlineable JS module. Drop into any seed via <script> or copy-paste inline.
 * Preserves single-HTML sovereignty (no external deps until user opts in to T2 WebLLM).
 *
 * What it gives every seed:
 *  - AI tier picker: T0 (off · default) · T2 (WebLLM in-browser, 5 models 1B-70B) · T3 (BYOK Anthropic/OpenAI/Google)
 *  - Universal entry: FallKit.aiComplete(systemPrompt, userMsg, maxTokens) → string|null
 *  - AI chip UI in header
 *  - WebRTC P2P mesh (ported from canonical fallnet · fall-signal channel · Google STUN)
 *  - Help section partial: FallKit.helpSection()
 *  - Settings panel: FallKit.openSettings()
 *
 * Doctrine (per botler CLAUDE.md):
 *  - T0 fallback ALWAYS works · aiComplete returns null · caller MUST degrade gracefully
 *  - NEVER hide a feature behind AI · NEVER proxy API keys · NEVER log keys
 *  - WebLLM is lazy-loaded · model weights download ONLY on user opt-in
 *
 * Estate-first canonical references:
 *  - WebLLM pattern: Downloads/botler/index.html (T0/T2/T3 cascade)
 *  - WebRTC pattern: Downloads/fallnet/fallnet-shim.js (raw RTCPeerConnection)
 *  - Konomi seal:    ◊·κ=1  (consistent across all estate seeds)
 *  - Mesh channel:   'fall-signal'
 */
(function (root) {
  'use strict';

  const FALL_KIT_VERSION = '1.2.0';
  const KCC_MINT_URL = 'https://sjgant80-hub.github.io/kcc-mint/';

  // ─── Model registry ──────────────────────────────────────────────
  const WEBLLM_MODELS = {
    'llama-1b':  { id: 'Llama-3.2-1B-Instruct-q4f16_1-MLC',   size: '~700MB', label: '1B · fast · any laptop / phone' },
    'llama-3b':  { id: 'Llama-3.2-3B-Instruct-q4f16_1-MLC',   size: '~2GB',   label: '3B · balanced · default · most laptops' },
    'qwen-7b':   { id: 'Qwen2.5-7B-Instruct-q4f16_1-MLC',     size: '~5GB',   label: '7B · capable · needs decent GPU (M-series Mac / 8GB+ VRAM)' },
    'llama-8b':  { id: 'Llama-3.1-8B-Instruct-q4f16_1-MLC',   size: '~5GB',   label: '8B · common · needs decent GPU' },
    'llama-70b': { id: 'Llama-3.1-70B-Instruct-q4f16_1-MLC',  size: '~40GB',  label: '70B · frontier · needs serious GPU + 64GB+ RAM' },
  };
  const DEFAULT_MODEL = 'llama-3b';

  const T3_PROVIDERS = {
    anthropic: { label: 'Anthropic Claude', models: ['claude-sonnet-4-5','claude-opus-4-7','claude-haiku-4-5'], default: 'claude-sonnet-4-5', url: 'https://api.anthropic.com/v1/messages' },
    openai:    { label: 'OpenAI',           models: ['gpt-4o','gpt-4o-mini','o1-mini'],                          default: 'gpt-4o-mini',      url: 'https://api.openai.com/v1/chat/completions' },
    google:    { label: 'Google Gemini',    models: ['gemini-1.5-pro','gemini-1.5-flash','gemini-2.0-flash-exp'], default: 'gemini-1.5-flash', url: 'https://generativelanguage.googleapis.com/v1beta/models/' },
  };

  // ─── State ───────────────────────────────────────────────────────
  const STATE = {
    config: loadConfig(),
    ai: { ready: false, loading: false, progress: 0, engine: null, model: null },
    mesh: { active: false, peers: new Map(), bc: null, signal: null },
  };

  function loadConfig() {
    try { return JSON.parse(localStorage.getItem('fall-kit.config') || '{}'); }
    catch (e) { return {}; }
  }
  function saveConfig() {
    try { localStorage.setItem('fall-kit.config', JSON.stringify(STATE.config)); } catch (e) {}
  }

  // ─── DOM helpers ─────────────────────────────────────────────────
  function $(s, root) { return (root || document).querySelector(s); }
  function esc(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }

  // ─── AI tier ─────────────────────────────────────────────────────
  function aiTier() { return STATE.config.ai_tier || 'T0'; }

  function renderAiChip() {
    const chip = $('#fk-ai-chip');
    if (!chip) return;
    const txt = $('#fk-ai-chip-text');
    chip.classList.remove('fk-chip-live', 'fk-chip-loading', 'fk-chip-warn');
    const tier = aiTier();
    if (tier === 'T0') { txt.textContent = 'T0 · off'; }
    else if (tier === 'T2') {
      if (STATE.ai.ready) { txt.textContent = 'T2 ' + (WEBLLM_MODELS[STATE.config.webllm_model || DEFAULT_MODEL]?.label.split(' · ')[0] || '') + ' · ready'; chip.classList.add('fk-chip-live'); }
      else if (STATE.ai.loading) { txt.textContent = 'T2 loading ' + Math.round(STATE.ai.progress) + '%'; chip.classList.add('fk-chip-loading'); }
      else { txt.textContent = 'T2 · click to load'; chip.classList.add('fk-chip-warn'); }
    } else if (tier === 'T3') {
      if (STATE.config.api_key) { txt.textContent = 'T3 ' + (T3_PROVIDERS[STATE.config.api_provider]?.label || 'BYOK') + ' · active'; chip.classList.add('fk-chip-live'); }
      else { txt.textContent = 'T3 · no key set'; chip.classList.add('fk-chip-warn'); }
    }
  }

  async function loadWebLLM(modelKey) {
    if (STATE.ai.loading) return;
    const key = modelKey || STATE.config.webllm_model || DEFAULT_MODEL;
    const model = WEBLLM_MODELS[key];
    if (!model) { console.error('fall-kit: unknown model', key); return; }
    if (STATE.ai.ready && STATE.ai.model === model.id) return;
    STATE.ai.loading = true; STATE.ai.progress = 0; renderAiChip();
    notify('Loading WebLLM · ' + model.label + ' · ' + model.size + ' first time', 'info');
    try {
      const { CreateMLCEngine } = await import('https://esm.run/@mlc-ai/web-llm@0.2.79');
      const engine = await CreateMLCEngine(model.id, {
        initProgressCallback: p => { STATE.ai.progress = (p.progress || 0) * 100; renderAiChip(); }
      });
      STATE.ai.engine = engine;
      STATE.ai.model = model.id;
      STATE.ai.ready = true;
      STATE.ai.loading = false;
      STATE.config.webllm_model = key; saveConfig();
      renderAiChip();
      notify('WebLLM ready · sovereign mode · ' + model.label.split(' · ')[0], 'ok');
    } catch (e) {
      console.error('fall-kit: WebLLM load failed', e);
      STATE.ai.loading = false; renderAiChip();
      notify('WebLLM load failed · ' + e.message, 'err');
    }
  }

  async function aiComplete(systemPrompt, userMsg, maxTokens) {
    maxTokens = maxTokens || 600;
    const tier = aiTier();
    if (tier === 'T2' && STATE.ai.ready && STATE.ai.engine) {
      const r = await STATE.ai.engine.chat.completions.create({
        messages: [{ role: 'system', content: systemPrompt }, { role: 'user', content: userMsg }],
        max_tokens: maxTokens,
      });
      return r.choices[0].message.content;
    }
    if (tier === 'T3' && STATE.config.api_key && STATE.config.api_provider) {
      return await aiCloudCall(systemPrompt, userMsg, maxTokens);
    }
    return null;
  }

  async function aiCloudCall(sys, msg, maxTokens) {
    const provider = STATE.config.api_provider;
    const key = STATE.config.api_key;
    const model = STATE.config.api_model || T3_PROVIDERS[provider]?.default;
    if (provider === 'anthropic') {
      const r = await fetch(T3_PROVIDERS.anthropic.url, {
        method: 'POST',
        headers: { 'content-type': 'application/json', 'x-api-key': key, 'anthropic-version': '2023-06-01' },
        body: JSON.stringify({ model, max_tokens: maxTokens, system: sys, messages: [{ role: 'user', content: msg }] }),
      });
      if (!r.ok) throw new Error('Anthropic ' + r.status + ': ' + (await r.text()).slice(0, 200));
      const j = await r.json();
      return j.content[0].text;
    }
    if (provider === 'openai') {
      const r = await fetch(T3_PROVIDERS.openai.url, {
        method: 'POST',
        headers: { 'content-type': 'application/json', 'Authorization': 'Bearer ' + key },
        body: JSON.stringify({ model, max_tokens: maxTokens, messages: [{ role: 'system', content: sys }, { role: 'user', content: msg }] }),
      });
      if (!r.ok) throw new Error('OpenAI ' + r.status);
      const j = await r.json();
      return j.choices[0].message.content;
    }
    if (provider === 'google') {
      const r = await fetch(T3_PROVIDERS.google.url + model + ':generateContent?key=' + encodeURIComponent(key), {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ contents: [{ role: 'user', parts: [{ text: sys + '\n\n---\n\n' + msg }] }], generationConfig: { maxOutputTokens: maxTokens } }),
      });
      if (!r.ok) throw new Error('Google ' + r.status);
      const j = await r.json();
      return j.candidates[0].content.parts[0].text;
    }
    throw new Error('unknown provider: ' + provider);
  }

  // ─── WebRTC P2P mesh (ported from canonical fallnet · fall-signal channel · Google STUN) ───
  const MESH_CHANNEL = 'fall-signal';
  const STUN_SERVERS = [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun1.l.google.com:19302' }];
  function meshStart(opts) {
    if (STATE.mesh.active) return;
    opts = opts || {};
    const seedId = opts.seedId || (location.pathname + '#' + Math.random().toString(36).slice(2, 8));
    STATE.mesh.seedId = seedId;
    try { STATE.mesh.bc = new BroadcastChannel(MESH_CHANNEL); }
    catch (e) { console.warn('fall-kit: BroadcastChannel unavailable'); return; }
    STATE.mesh.bc.onmessage = e => {
      const m = e.data;

  function openMint() {
    const slug = (STATE.config.seedName || location.hostname.split('.')[0] || 'seed').replace(/[^a-z0-9-]/gi, '-').toLowerCase();

    const desc = document.querySelector('meta[name="description"]')?.content?.slice(0, 200) || '';
    const params = new URLSearchParams({ fork: '1', parent_slug: slug, parent_name: name, parent_url: url, parent_desc: desc });

      mintBtn.onclick = openMint;

    renderAiChip();
    return { version: FALL_KIT_VERSION, mounted: true };

  // ─── Public API ──────────────────────────────────────────────────
  root.FallKit = {
    version: FALL_KIT_VERSION,

const fmt=n=>(+n||0).toLocaleString('en-GB',{minimumFractionDigits:0,maximumFractionDigits:0});

function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');clearTimeout(t._to);t._to=setTimeout(()=>t.classList.remove('show'),1900)}
async function sha256(s){const buf=new TextEncoder().encode(String(s));const h=await crypto.subtle.digest('SHA-256',buf);return Array.from(new Uint8Array(h)).map(b=>b.toString(16).padStart(2,'0')).join('')}

// ─── IDB ───
let db;
const STORES=['state','clients','advisers','firms','properties','tenancies','clientMoney','rentLedger','deposits','contractors','landlordDisbursements','agencyFees','salesCommission','expenses','audit'];
function openDB(){return new Promise((res,rej)=>{
  const r=indexedDB.open(STORE,1);
  r.onupgradeneeded=e=>{const d=e.target.result;for(const s of STORES){if(!d.objectStoreNames.contains(s)){d.createObjectStore(s,{keyPath:'id'})}}};
  r.onsuccess=e=>{db=e.target.result;res(db)};
  r.onerror=()=>rej(r.error);
});}
function txStore(name,mode='readonly'){const tx=db.transaction(name,mode);return tx.objectStore(name)}
function idbPut(store,val){return new Promise(r=>{const req=txStore(store,'readwrite').put(val);req.onsuccess=()=>r(true);req.onerror=()=>r(false)})}
function idbDel(store,key){return new Promise(r=>{const req=txStore(store,'readwrite').delete(key);req.onsuccess=()=>r(true)})}
function idbGetAll(store){return new Promise(r=>{const req=txStore(store).getAll();req.onsuccess=()=>r(req.result||[]);req.onerror=()=>r([])})}
function idbGet(store,key){return new Promise(r=>{const req=txStore(store).get(key);req.onsuccess=()=>r(req.result);req.onerror=()=>r(null)})}

async function appendAudit(action,reasoning,payload){
  if(!state.settings.auditChain)return;
  const prev=state.audit.length?state.audit[state.audit.length-1]:null;
  const prevHash=prev?prev.hash:'';
  const docStr=JSON.stringify(payload||{});
  const docHash=await sha256(docStr);
  const i=(prev?prev.i:0)+1;
  const ts=Date.now();
  const hash=await sha256(prevHash+docHash+ts+i);
  const entry={id:'au_'+i+'_'+ts,i,ts,tool:TOOLNAME,configVersion:TOOLNAME+'@'+VERSION,adviserId:'',clientId:payload?.clientId||'',action,reasoning:reasoning||'',prevHash,docHash,hash,payload:payload||{}};
  state.audit.push(entry);
  if(state.audit.length>5000)state.audit=state.audit.slice(-5000);
  await idbPut('audit',entry);
}

let bcEstate,bcSignal;
function initMesh(){
  try{bcSignal=new BroadcastChannel('fall-signal');bcSignal.postMessage({source:TOOLNAME,type:'hello',prime:PRIME,version:VERSION,ts:now()})}catch(e){}
  try{bcEstate=new BroadcastChannel('fall-estate');bcEstate.addEventListener('message',async e=>{
    const m=e.data;if(!m||m.source===TOOLNAME)return;
    if(m.type==='sync.snapshot'){
      const p=m.payload||{};
      if(Array.isArray(p.clients))for(const c of p.clients){if(!state.clients.find(x=>x.id===c.id)){state.clients.push(c);await idbPut('clients',c);}}
      if(p.firm&&!state.firm){state.firm=p.firm;await idbPut('firms',p.firm);}
      render();
    }
  });bcEstate.postMessage({v:1,type:'sync.request',ts:now(),source:TOOLNAME})}catch(e){}}

function clientName(id){const c=state.clients.find(x=>x.id===id);if(!c)return id?(id.slice(0,8)+'…'):'—';return ((c.title||'')+' '+(c.firstName||'')+' '+(c.lastName||'')).trim()||c.id.slice(0,8)}
function propAddr(id){const p=state.properties.find(x=>x.id===id);return p?p.address:'—'}
function adviserName(id){const a=state.advisers.find(x=>x.id===id);return a?a.name:id?(id.slice(0,8)+'…'):'—'}
function depositDaysLeft(dep){if(dep.protectedAt)return null;return RULES.depositProtectDays-daysBetween(dep.receivedAt,now())}
function depositStatus(dep){if(dep.protectedAt)return {cls:'green',label:'protected'};const d=depositDaysLeft(dep);if(d<=0)return {cls:'red',label:'OVERDUE'};if(d<=RULES.depositAmberDay)return {cls:'amber',label:d+'d left'};return {cls:'muted',label:d+'d left'}}
function tenancyLabel(id){const t=state.tenancies.find(x=>x.id===id);if(!t)return '—';return propAddr(t.propertyId)+' · '+clientName(t.tenantId)}

// ─── aggregation ───
function totalRentCollected(mk){return state.rentLedger.filter(r=>monthKey(r.paidDate)===mk&&r.paidDate).reduce((s,r)=>s+(+r.amount||0),0)}
function totalRentDue(mk){return state.rentLedger.filter(r=>monthKey(r.dueDate)===mk).reduce((s,r)=>s+(+r.amount||0),0)}
function totalArrears(){return state.rentLedger.filter(r=>!r.paidDate&&r.dueDate<now()).reduce((s,r)=>s+(+r.amount||0),0)}
function totalArrearsCount(){return state.rentLedger.filter(r=>!r.paidDate&&r.dueDate<now()).length}
function totalContractorPaid(mk){return state.contractors.filter(c=>c.paidAt&&monthKey(c.paidAt)===mk).reduce((s,c)=>s+(+c.amount||0),0)}
function totalAgencyFees(mk){return state.agencyFees.filter(f=>monthKey(f.date||now())===mk).reduce((s,f)=>s+(+f.amount||0),0)}
function totalSalesComm(mk){return state.salesCommission.filter(c=>c.paidAt&&monthKey(c.paidAt)===mk).reduce((s,c)=>s+((+c.salePrice||0)*(+c.agreedPct||0)/100),0)}
function totalExpenses(mk){return state.expenses.filter(x=>monthKey(x.date)===mk).reduce((s,x)=>s+(+x.amount||0),0)}
function totalLandlordDisbursed(mk){return state.landlordDisbursements.filter(d=>d.monthKey===mk).reduce((s,d)=>s+(+d.netToLandlord||0),0)}
function grossRevenue(mk){return totalAgencyFees(mk)+totalSalesComm(mk)}
function netRevenue(mk){return grossRevenue(mk)-totalExpenses(mk)}
function cmpBalance(){return state.clientMoney.reduce((s,e)=>s+((e.direction==='in'?1:-1)*(+e.amount||0)),0)}
function unprotectedDeposits(){return state.deposits.filter(d=>!d.protectedAt)}
function overdueDeposits(){return state.deposits.filter(d=>!d.protectedAt&&(now()-d.receivedAt)>RULES.depositProtectDays*dayMs)}

// ─── CMP daily reconciliation ───
function cmpLastReconciled(){const recs=state.clientMoney.filter(e=>e.type==='reconciliation');if(!recs.length)return null;return Math.max(...recs.map(e=>e.date))}
function cmpDaysSinceRecon(){const lr=cmpLastReconciled();if(!lr)return 999;return daysBetween(lr,now())}
function cmpStatus(){const d=cmpDaysSinceRecon();if(d<=1)return {cls:'green',label:'current'};if(d<=RULES.cmpAmberDays)return {cls:'amber',label:d+'d ago'};return {cls:'red',label:d+'d — overdue'}}

// ─── FIRM P&L ───
function renderFirmPL(v){
  const months=[];const d=new Date();for(let i=0;i<12;i++){months.push(new Date(d.getFullYear(),d.getMonth()-i,1).toISOString().slice(0,7))}months.reverse();
  const annualAgency=months.reduce((s,m)=>s+totalAgencyFees(m),0);
  const annualSales=months.reduce((s,m)=>s+totalSalesComm(m),0);
  const annualExp=months.reduce((s,m)=>s+totalExpenses(m),0);
  const annualGross=annualAgency+annualSales;
  const overheads=(+state.settings.piAnnualPremium||0)+(+state.settings.cmpSchemeAnnual||0)+(+state.settings.hmrcAmlAnnual||0)+(+state.settings.propertyMarkAnnual||0);
  const annualNet=annualGross-annualExp-overheads;
  const vatLiable=annualGross>RULES.vatRegThreshold;
  v.innerHTML=`<div class="section-h"><h2>Firm P&L</h2><div class="sub">rolling 12m</div></div>
  <div class="grid" style="margin-bottom:18px">
    <div class="card"><h3>Revenue</h3>
      <div class="kpi"><span class="l">agency fees</span><span class="v">${moneyP(annualAgency)}</span></div>
      <div class="kpi"><span class="l">sales commission</span><span class="v">${moneyP(annualSales)}</span></div>
      <div class="kpi"><span class="l">gross revenue</span><span class="v brass">${moneyP(annualGross)}</span></div>
    </div>
    <div class="card"><h3>Costs</h3>
      <div class="kpi"><span class="l">expenses</span><span class="v">${moneyP(annualExp)}</span></div>
      <div class="kpi"><span class="l">PI insurance</span><span class="v">${moneyP(state.settings.piAnnualPremium)}</span></div>
      <div class="kpi"><span class="l">CMP scheme</span><span class="v">${moneyP(state.settings.cmpSchemeAnnual)}</span></div>
      <div class="kpi"><span class="l">HMRC AML supervision</span><span class="v">${moneyP(state.settings.hmrcAmlAnnual)}</span></div>
      <div class="kpi"><span class="l">Propertymark</span><span class="v">${moneyP(state.settings.propertyMarkAnnual)}</span></div>
      <div class="kpi"><span class="l">total overheads</span><span class="v red">${moneyP(annualExp+overheads)}</span></div>
    </div>
    <div class="card"><h3>Net</h3>
      <div class="kpi"><span class="l">net profit</span><span class="v ${annualNet>=0?'green':'red'}">${moneyP(annualNet)}</span></div>
      <div class="kpi"><span class="l">margin</span><span class="v">${annualGross>0?pct(annualNet/annualGross):'—'}</span></div>
      <div class="kpi"><span class="l">VAT threshold</span><span class="v ${vatLiable?'amber':'green'}">${vatLiable?'ABOVE — register':'below'}</span></div>
    </div>
  </div>
  <h3 style="font-family:var(--serif);margin-bottom:10px">Monthly Breakdown</h3>
  <table><thead><tr><th>Month</th><th>Agency fees</th><th>Sales comm</th><th>Expenses</th><th>Net</th></tr></thead><tbody>${months.map(m=>{const af=totalAgencyFees(m);const sc=totalSalesComm(m);const ex=totalExpenses(m);const n=af+sc-ex;return `<tr><td>${m}</td><td class="r">${moneyP(af)}</td><td class="r">${moneyP(sc)}</td><td class="r">${moneyP(ex)}</td><td class="r" style="color:${n>=0?'var(--green)':'var(--red)'}">${moneyP(n)}</td></tr>`}).join('')}</tbody></table>`;
}

// ─── Q&A ───
const T0_QA=[
  {q:/cmp|client money|protection/i,a:'Client Money Protection (CMP) is mandatory for letting agents in England holding client money (Client Money Protection Schemes for Property Agents (Requirement to Belong to a Scheme etc.) Regulations 2019). Key requirements: belong to an approved scheme (e.g. PropertyMark, RICS, ARLA), daily reconciliation of client account vs records, annual independent audit/inspection, minimum PI cover, client money must be in a designated client account separate from office money.'},
  {q:/deposit|30.?day|housing act 2004/i,a:'Housing Act 2004: tenancy deposits must be protected in DPS, MyDeposits, or TDS within 30 days of receipt. Prescribed Information (SI 2007/797) must also be served within 30 days. Failure penalty: 1-3× the deposit amount, and the landlord cannot serve a valid Section 21 notice. Tenant Fees Act 2019 caps deposits at 5 weeks\' rent for ASTs where annual rent <£50k.'},
  {q:/rent.?arrears|ground.?8|s8/i,a:'Ground 8 (Housing Act 1988, Sch.2): mandatory ground for possession where at least 2 months\' rent is unpaid at the date of notice AND at the hearing. Notice period: 2 weeks minimum. Pre-action protocol: contact tenant, offer payment plans, signpost to debt advice. Section 8 notice must specify the ground(s) and particulars.'},
  {q:/agency.?fee|commission|sole|multi/i,a:'Estate agency commission structures: sole agency (typically 1-1.5% + VAT), multi-agency (2-3% + VAT), online/hybrid (fixed fee). Commission triggers on exchange of contracts (not completion). EA 1979 s.18 requires clear explanation of sole agency / sole selling rights / multi-agency terms. Agent must disclose personal interests.'},
  {q:/vat|threshold|registration/i,a:'VAT registration threshold: £90,000 (2025-26). Estate agents must register if taxable turnover exceeds threshold in any rolling 12-month period. Agency fees and sales commissions are standard-rated (20%). Residential rent is exempt. CMP client money is not turnover. Management fees charged to landlords are standard-rated.'},
  {q:/landlord.?statement|disbursement/i,a:'Monthly landlord statement should show: rent collected, agency management fee (deducted), maintenance costs (deducted from client account with landlord authority), VAT on fees, net amount remitted to landlord. CMP rules require: payments from client account only for authorised purposes, clear records, no commingling with office funds.'},
  {q:/pi|insurance|professional.?indemnity/i,a:'PI (Professional Indemnity) insurance is required for CMP scheme membership and PropertyMark/ARLA membership. Typical minimum cover: £100k per single claim. CMP schemes require the agent to maintain adequate PI. RICS firms need minimum £500k. Check your scheme\'s specific requirements. PI covers negligence, errors, and omissions.'},
  {q:/redress|tpo|prs|ombudsman/i,a:'Property redress scheme membership is mandatory (Enterprise & Regulatory Reform Act 2013). Approved schemes: Property Ombudsman (TPO) and Property Redress Scheme (PRS). Penalty for non-membership: up to £5,000. Both lettings and sales activities require membership. Complaints must be handled via internal complaints procedure first, then referred to the scheme.'},
  {q:/aml|money.?laundering|mlr/i,a:'MLR 2017 applies to estate agents in property transactions. CDD required for all parties. High-value properties and cash transactions are higher risk. HMRC is the supervisory authority (not FCA). Agents must: register with HMRC, conduct risk assessments, apply CDD, report suspicious activity (SAR to NCA), keep records for 5 years. Annual supervision fee ~£300 per premise.'},
  {q:/inspection|inventory|check.?out/i,a:'Inventory and inspection best practice: detailed check-in inventory (room-by-room condition, meter readings, photos), periodic inspections (typically quarterly), check-out inventory. For deposit disputes: inventory is primary evidence. ADR schemes (DPS/MyDeposits/TDS) rely heavily on the quality of the inventory. Mid-tenancy inspections require 24 hours\' written notice.'},
];
function askT0(q){for(const r of T0_QA){if(r.q.test(q))return {answer:r.a,source:'T0 · UK estate/letting rules'};}return null}
async function askT3(q){if(!state.settings.anthropicKey)return null;try{const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'x-api-key':state.settings.anthropicKey,'anthropic-version':'2023-06-01','content-type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:600,messages:[{role:'user',content:'You are a UK estate & letting agent accounting expert. CMP, deposits, rent, commission, VAT. Concise answer.\n\n'+q}]})});if(!res.ok)return null;const j=await res.json();return {answer:j.content?.[0]?.text,source:'T3 · Anthropic'}}catch(e){return null}}

function renderQA(v){
  v.innerHTML=`<div class="section-h"><h2>Q & A</h2><div class="sub">T0 + T3 BYOK</div></div>
  <div class="card" style="max-width:780px">
    <div class="chat" id="chatBox">${(state.chat||[]).map(m=>`<div class="msg ${m.role}">${esc(m.text)}${m.source?`<div class="src">${esc(m.source)}</div>`:''}</div>`).join('')}</div>
    <div class="chat-input"><input id="chatIn" placeholder="Ask… 'CMP daily reconciliation?' · '30-day deposit rule?'" onkeydown="if(event.key==='Enter')askQuestion()"><button class="btn brass" onclick="askQuestion()">Ask</button></div>
  </div>`;
  const box=$('#chatBox');if(box)box.scrollTop=box.scrollHeight;
}
async function askQuestion(){const inp=$('#chatIn');if(!inp)return;const q=inp.value.trim();if(!q)return;inp.value='';if(!state.chat)state.chat=[];state.chat.push({role:'user',text:q});render();let r=askT0(q);if(!r)r=await askT3(q);state.chat.push(r?{role:'bot',text:r.answer,source:r.source}:{role:'bot',text:'No T0 match. Add BYOK key in Settings for T3.',source:'system'});saveState();render();}

function exportAll(){const d={tool:TOOLNAME,v:VERSION,ts:now(),firm:state.firm,clients:state.clients,advisers:state.advisers,properties:state.properties,tenancies:state.tenancies,clientMoney:state.clientMoney,rentLedger:state.rentLedger,deposits:state.deposits,contractors:state.contractors,landlordDisbursements:state.landlordDisbursements,agencyFees:state.agencyFees,salesCommission:state.salesCommission,expenses:state.expenses};const b=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='fallestatepractice-export.json';a.click();URL.revokeObjectURL(u);toast('Exported')}
function importAll(){const inp=document.createElement('input');inp.type='file';inp.accept='.json';inp.onchange=async()=>{const f=inp.files[0];if(!f)return;try{const d=JSON.parse(await f.text());if(d.firm){state.firm=d.firm;await idbPut('firms',d.firm)}for(const k of['clients','advisers','properties','tenancies','clientMoney','rentLedger','deposits','contractors','landlordDisbursements','agencyFees','salesCommission','expenses']){if(Array.isArray(d[k]))for(const r of d[k]){state[k].push(r);await idbPut(k,r)}}toast('Imported');render()}catch(e){toast('Import failed')}};inp.click()}
async function wipeAll(){if(!confirm('Wipe ALL data?'))return;for(const s of STORES){try{const tx=db.transaction(s,'readwrite');tx.objectStore(s).clear();await new Promise(r=>{tx.oncomplete=r})}catch(e){}}location.reload()}
